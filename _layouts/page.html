---
layout: default
---

<article class="page-article">
  <header class="page-article-header">
    <h1 class="page-article-title">{{ page.title | escape }}</h1>
    {% if page.subtitle %}
    <p class="page-article-subtitle">{{ page.subtitle | escape }}</p>
    {% endif %}
  </header>

  <div class="page-article-content">
    {{ content }}
  </div>
</article>
