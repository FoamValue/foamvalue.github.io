# 站点配置
title: "FoamValue"
description: "一个专注于程序员技术分享的个人博客"
author:
  name: "陈鑫杰"
  email: "FoamValue@live.cn"
  bio: "热爱编程，分享技术与生活"

# Jekyll 配置
baseurl: ""
url: "https://chenxinjie.cn"
permalink: /posts/:year/:month/:day/:title/

# 构建配置
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    default_lang: plaintext
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1
      line_number_anchors: true

# GitHub Pages 支持的插件
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate



# 分页
paginate: 10
paginate_path: "/page/:num/"

# 默认布局
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true
      author: "陈鑫杰"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

# 集合
collections:
  projects:
    output: true
    permalink: /projects/:name/

# 排除文件
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .git
  - README.md
  - Dockerfile
